# Baseline configuration for iceshelf running inside Docker.
#
# This file is mounted into the container at /config/iceshelf.conf and provides
# default settings for ALL backup targets.  Individual targets can override any
# setting by placing their own config at <folder>/.iceshelf/config.
#
# IMPORTANT:
#   - Do NOT define [sources] here.  Sources are auto-generated from the
#     folder that contains the .iceshelf/config file.
#   - [paths] are forced by the entrypoint (prep dir, data dir, done dir)
#     so values here are ignored.  They are included only for clarity.
#

# Paths are managed automatically by the Docker entrypoint.
# You do not need to change these.
[paths]
prep dir:
data dir:
done dir:

[options]
max size:
change method: data
delta manifest: yes
compress: yes
persuasive: yes
ignore overlimit: no
incompressible:
max keep: 0
prefix:
detect move: no
skip empty: no

[exclude]

# Provider settings -- at least one provider section is required or the
# backup will fail immediately.  See providers/*.md for per-type options.
#
# Example: copy provider (local directory inside the container)
#[provider-local]
#type: cp
#dest: /backups/

# Example: S3 provider
#[provider-cloud]
#type: s3
#bucket: mybucket
#region: us-east-1
#access key id:
#secret access key:

# Example: SFTP provider
#[provider-remote]
#type: sftp
#host: backup.example.com
#port: 22
#user: backupuser
#key: /config/id_ed25519
#path: /backups/iceshelf

[custom]
pre command:
post command:

[security]
encrypt:
encrypt phrase:
sign:
sign phrase:
key file:
add parity: 0
